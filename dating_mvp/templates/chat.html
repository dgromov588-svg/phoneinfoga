{% extends 'base.html' %}
{% block title %}Чат{% endblock %}
{% block content %}
<h1>Чат с {{ other['name'] }}</h1>

<section class="card chat-box" id="chat-box" data-other-user-id="{{ other['id'] }}" data-my-id="{{ me['id'] }}">
  {% for m in messages %}
    <div class="msg {% if m['from_user_id'] == me['id'] %}mine{% endif %}">
      <div class="msg-author">{{ m['author_name'] }}</div>
      <div>{{ m['body'] }}</div>
      <small>{{ m['created_at'] }}</small>
    </div>
  {% else %}
    <p>Сообщений пока нет.</p>
  {% endfor %}
</section>

<form method="post" class="card form-inline" id="chat-form">
  <input name="body" id="chat-input" placeholder="Напишите сообщение..." required />
  <button type="submit">Отправить</button>
</form>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const box = document.getElementById('chat-box');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const otherUserId = Number(box.dataset.otherUserId);
  const myId = Number(box.dataset.myId);
  const socket = io();

  socket.emit('join_chat', { other_user_id: otherUserId });

  socket.on('new_message', (msg) => {
    const div = document.createElement('div');
    div.className = `msg ${msg.from_user_id === myId ? 'mine' : ''}`;
    div.innerHTML = `<div class="msg-author">${msg.author_name || 'User'}</div><div>${msg.body}</div><small>${msg.created_at}</small>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send_chat', { other_user_id: otherUserId, body: text });
    input.value = '';
  });
</script>
{% endblock %}
