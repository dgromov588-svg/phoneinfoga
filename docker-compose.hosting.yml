services:
  phoneinfoga-hosting:
    build:
      context: .
      dockerfile: Dockerfile.hosting
    container_name: phoneinfoga-hosting
    restart: unless-stopped
    env_file:
      - .env.hosting
    environment:
      REPO_URL: ${REPO_URL}
      REPO_BRANCH: ${REPO_BRANCH:-master}
      AUTO_UPDATE: ${AUTO_UPDATE:-true}
      APP_CMD: ${APP_CMD:-python universal_search_system.py}
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - phoneinfoga_repo:/opt/app

volumes:
  phoneinfoga_repo:
